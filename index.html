<!doctype html>
<html>
  <head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container reg-container">
      <h2>Registration Form</h2>
      <form id="regForm" method="POST" action="register_process.php">
        <table>
          <tr>
            <td>
              <label class="field-label">First Name</label>
              <input type="text" id="fname" name="fname" />
            </td>
            <td>
              <label class="field-label">Last Name</label>
              <input type="text" id="lname" name="lname" />
            </td>
            <td>
              <label class="field-label">Department</label>
              <select name="dept">
                <option>Computer Science</option>
                <option>Information Technology</option>
                <option>Engineering</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>
              <label class="field-label">Gender</label>
              <div class="inline">
                <input type="radio" name="gender" value="Male" /> Male
              </div>
              <div class="inline">
                <input type="radio" name="gender" value="Female" /> Female
              </div>
              <div class="inline">
                <input type="radio" name="gender" value="Other" /> Other
              </div>
            </td>
            <td>
              <label class="field-label">Hobbies</label>
              <div class="inline">
                <input
                  type="checkbox"
                  class="hobby-check"
                  name="hobbies[]"
                  value="Reading"
                />
                Reading
              </div>
              <div class="inline">
                <input
                  type="checkbox"
                  class="hobby-check"
                  name="hobbies[]"
                  value="Sports"
                />
                Sports
              </div>
              <div class="inline">
                <input
                  type="checkbox"
                  class="hobby-check"
                  name="hobbies[]"
                  value="Music"
                />
                Music
              </div>
              <div class="inline">
                <input
                  type="checkbox"
                  class="hobby-check"
                  name="hobbies[]"
                  value="Travel"
                />
                Travel
              </div>
            </td>
            <td>
              <label class="field-label">Others</label>
              <textarea id="others" name="others" rows="4"></textarea>
            </td>
          </tr>
        </table>

        <div class="buttons">
          <button type="submit" class="register">Register</button>
          <button type="button" id="confirmClear" class="clear">Clear</button>
        </div>

        <div class="footer-link">
          <a href="login.php">Already have an account? Login here</a>
        </div>
      </form>
    </div>

    <script>
      // --- 1. THE CLEAR CONFIRMATION SIGNAL ---
      document
        .getElementById("confirmClear")
        .addEventListener("click", function () {
          // Displays a browser popup with OK and Cancel
          const userConfirmed = confirm(
            "Are you sure? This will wipe all the information you typed.",
          );

          if (userConfirmed) {
            document.getElementById("regForm").reset();
          }
        });

      // --- 2. THE REGISTRATION VALIDATION SIGNAL ---
      document
        .getElementById("regForm")
        .addEventListener("submit", function (e) {
          // Grab the elements
          const fname = document.getElementById("fname").value.trim();
          const lname = document.getElementById("lname").value.trim();
          const gender = document.querySelector('input[name="gender"]:checked');
          const hobbies = document.querySelectorAll(".hobby-check:checked");
          const others = document.getElementById("others").value.trim();

          let errors = [];

          // Logic: Names must be filled
          if (fname === "" || lname === "") {
            errors.push("First and Last Name are required.");
          }

          // Logic: Gender must be selected
          if (!gender) {
            errors.push("Please select a Gender.");
          }

          // Logic: Must have a hobby OR something in the others box
          if (hobbies.length === 0 && others === "") {
            errors.push(
              "Please select at least one hobby (like Travel!) or fill out the 'Others' box.",
            );
          }

          // If there are errors, stop the form and alert the user
          if (errors.length > 0) {
            // This stops the 405 error by preventing the form from submitting
            e.preventDefault();
            alert("Wait! Please fix the following:\n\n" + errors.join("\n"));
          }
        });
    </script>
  </body>
</html>
